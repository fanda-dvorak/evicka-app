<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Miluji tě</title>
</head>
<body>

  <div class="bg" id="bg"></div>

  <header class="toolbar">
    <button class="share-btn" id="shareBtn" aria-label="Sdílet" type="button">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
  </header>

  <main class="main">
    <div class="photo-wrap">
      <img class="photo" src="noc_pod_maskou.jpg" alt="My love" draggable="false" />
    </div>

    <p class="greeting">Evičko,</p>
    <h1 class="title">miluji&nbsp;tě</h1>

    <div class="heart-wrap">
      <div class="heart-glow"></div>
      <svg class="heart-svg" id="heart" viewBox="0 0 24 24"
           role="button" tabindex="0" aria-label="Klikni na srdce">
        <path d="M12 21s-6.716-4.388-9.428-7.1C.78 12.108.5 9.156 2.343 7.314a4.95 4.95 0 0 1 7 0L12 9.971l2.657-2.657a4.95 4.95 0 1 1 7 7C18.716 16.612 12 21 12 21z" fill="currentColor"/>
      </svg>
    </div>

    <p class="note" id="note"></p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-dot">♥</span>
      <div class="divider-line"></div>
    </div>
  </main>

  <footer class="stats">
    <p class="anniversary" id="anniversary"></p>
    <p class="countdown"   id="countdown"></p>
  </footer>

  <script src="messages.js"></script>
  <script src="app.js"></script>
</body>
</html>
