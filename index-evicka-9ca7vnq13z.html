<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Miluji tě</title>
</head>
<body>

  <div class="bg" id="bg"></div>

  <!-- Stage 0: Photo -->
  <div class="stage" id="s0">
    <img class="cover-photo" src="noc_pod_maskou.jpg" alt="" draggable="false" />
    <div class="photo-overlay"></div>
    <span class="tap-hint">Klepni kdekoli ♡</span>
  </div>

  <!-- Stage 1: Title + heart -->
  <div class="stage stage--out stage--gone" id="s1">
    <div class="title-wrap">
      <p class="greeting">Evičko,</p>
      <h1 class="title">miluji&nbsp;tě</h1>
    </div>
    <div class="heart-bottom-wrap">
      <div class="heart-wrap">
        <div class="heart-glow"></div>
        <svg class="heart-svg" id="heartBtn" viewBox="0 0 24 24"
             role="button" tabindex="0" aria-label="Klikni na srdce">
          <path d="M12 21s-6.716-4.388-9.428-7.1C.78 12.108.5 9.156 2.343 7.314a4.95 4.95 0 0 1 7 0L12 9.971l2.657-2.657a4.95 4.95 0 1 1 7 7C18.716 16.612 12 21 12 21z" fill="currentColor"/>
        </svg>
      </div>
      <p class="heart-hint">klepni na srdce</p>
    </div>
    <div class="messages-wrap messages-wrap--collapsed" id="messagesWrap"></div>
  </div>

  <script src="messages.js"></script>
  <script src="app.js"></script>
</body>
</html>
